<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recipe Explorer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5 app-wrapper">

<h1 class="text-center">Recipe Explorer</h1>

<p class="text-center hero-subtitle">
Search for dishes from around the world
</p>

<div class="input-group mb-3">

<input
id="searchInput"
class="form-control"
placeholder="Search for a dish..."
>

<button id="searchBtn" class="btn btn-primary">
Search
</button>

</div>

<div id="suggested" class="suggested-terms text-center mb-3">

<span data-term="chicken">Chicken</span>
<span data-term="beef">Beef</span>
<span data-term="pasta">Pasta</span>
<span data-term="rice">Rice</span>
<span data-term="cheese">Cheese</span>

</div>

<p id="message" class="text-center text-muted"></p>

<div id="results" class="row"></div>

</div>


<div class="modal fade" id="recipeModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Recipe Details</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="modalBody"></div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
