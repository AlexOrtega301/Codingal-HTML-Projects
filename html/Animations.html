<!DOCTYPE html>
<html>
<head>
<style> 
/* The animation code */
@keyframes example {
  0%   {background-color: red;}
  25%  {background-color: yellow;}
  50%  {background-color: blue;}
  100% {background-color: rgb(21, 54, 21);}
}

/* The element to apply the animation to */
div {
  width: 1080px;
  height: 720px;
  background-color: red;
  animation-name: example;
  animation-duration: 4s;
}

</style>
</head>
<body>
​<div>
Alex Super Duper ANIMATION </div></body>
</html>
