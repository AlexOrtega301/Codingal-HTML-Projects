    <script>
      // Function with default parameters
      function calculateTotal(price, quantity = 1, discount = 0.10) {
        let subtotal = price * quantity;
        let discountAmount = subtotal * discount;
        let total = subtotal - discountAmount;

        return `
          Price: $${price} <br>
          Quantity: ${quantity} <br>
          Discount: ${(discount * 100).toFixed(0)}% <br>
          Subtotal: $${subtotal.toFixed(2)} <br>
          Discount Amount: $${discountAmount.toFixed(2)} <br>
          <strong>Total: $${total.toFixed(2)}</strong>
        `;
      }
      

      // Example 1: Only passing prices
      let cart1 = calculateTotal(50);

      // Example 2: Passing price and quantity
      let cart2 = calculateTotal(100, 3);

      // Example 3: Passing price, quantity and custom discount
      let cart3 = calculateTotal(200, 2, 0.20);

      // Display results
      document.getElementById("result").innerHTML =
        "<h3>Example 1 (Default Quantity & Discount):</h3>" + cart1 +
        "<hr><h3>Example 2 (Default Discount):</h3>" + cart2 +
        "<hr><h3>Example 3 (Custom Discount):</h3>" + cart3;
    </script>
  </body>
