<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Form Fill (Powered With ReCaptcha)</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
	  <form>
		  <fieldset>
			  <!-- The fieldset tag is used to group related elements in a form and draws a box around them-->
			  <legend>Personal Information:</legend>
			  <label>Full name:</label>
			  <!--placeholder attribute can be used to provide extra information about entry to be made-->
			  <input type="text" id="fname" placeholder="Enter Name"><br><br>
			  <label>Email:</label>
			  <input type="text" id="email"><br><br>
			  <label>Password:</label>
			  <input type="password" id="password"><br><br>
              <label>Gender:</label><br>
			  <input type="radio" id="gender" value="female">Female<br>
			  <input type="radio" id="gender" value="male">Male<br><br>
              <label><h5>Other: Please Especify, if you selected a gender please leave this empty</h5></label><br>
              <input type="text" id="Custom_gender_inclusive"><br><br>
			  <label>Birthday:</label>
			  <input type="date" id="birthday" name="birthday"><br><br>
			  <label>Phone:</label>
			  <input type="text" id="number"><br><br>
			  <label>Address:</label>
			  <input type="password" id="address"><br><br>
			  <label>Favorite Food or Color (ReCaptcha):</label>
			  <input type="text" id="captcha"><br><br> 
		      <input type="submit">              
		  </fieldset>
	  </form>
  </body>
</html>
