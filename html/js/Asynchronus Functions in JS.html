<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async/Await Example</title>
</head>
<body>
  <h2>JavaScript async / await</h2>
  <p>In this example, we calculate the product of two numbers using an asynchronous function.</p>
  
  <h1 id="result"></h1>

  <script>
    // Asynchronous function using async/await
    async function product(a, b) {
      // Simulating async operation with Promise
      let response = await (a * b);
      display(response);
    }

    // Function to display the result
    function display(some) {
      document.getElementById("result").innerHTML = some;
    }

    // Call the asynchronous function
    product(5, 20);
  </script>
</body>
</html>
