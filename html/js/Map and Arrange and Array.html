<!DOCTYPE html>
<html>
<head>
    <title>Ascending and Descending for Mapped Numbers</title>
</head>
<body>

<h2>Ascending and Descending for Mapped Numbers</h2>
<p id="product_value"></p>

<!-- Step 6: Buttons -->
<button onclick="ascending()">Ascending order</button>
<button onclick="descending()">Descending order</button>

<script>
    // Step 8: Create an array
    var numbers = [25, 12, 19, 94];

    // Step 9: Multiplication function
    function myFunction(num) {
        return num * 50;
    }

    // Step 10: Map array with multiplication function
    var newarray = numbers.map(myFunction);

    // Step 11: Print mapped values
    document.getElementById("product_value").innerHTML = 
        "The Mapped values are: " + newarray;

    // Step 12: Ascending order function
    function ascending() {
        newarray.sort(function(a, b){return a - b});
        document.getElementById("product_value").innerHTML = 
            "The ascending order of mapped values are: " + newarray;
    }

    // Step 12: Descending order function
    function descending() {
        newarray.sort(function(a, b){return b - a});
        document.getElementById("product_value").innerHTML = 
            "The descending order of mapped values are: " + newarray;
    }
</script>

</body>
</html>
