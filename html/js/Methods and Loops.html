<!DOCTYPE html>
<html>
<head>
    <title>JavaScript String Methods and Loops</title>
</head>
<body>
    <h2>JavaScript String Methods and Loops</h2>
    <p>This page displays numbers from 1 to 10, a random number, and the current date using JavaScript.</p>

    <!-- Paragraph to display the result of the loop -->
    <p id="result"></p>

    <script>
        // Step 7: Create a variable to hold numbers as a string
        var number = "";

        // Step 8 & 9: For loop from 1 to 10
        for (var i = 1; i <= 10; i++) {
            number += i + "<br>"; // Append each number with a line break
        }

        // Step 10: Display numbers inside the <p> tag using its id
        document.getElementById("result").innerHTML = number;

        // Step 11: Print a rounded random number
        var randomValue = Math.floor(Math.random() * 100);
        document.write("<p>The random value is " + randomValue + "</p>");

        // Step 12: Print the current date
        var date = new Date();
        document.write("<p>Today's Date is " + date.toDateString() + "</p>");
    </script>
</body>
</html>
