<!DOCTYPE html>
<html>
  <body>
    <h2>JavaScript String Methods</h2>
    <p>Basic Methods</p>
    <script>
      var str = "AlEx Is AMAzing";
      document.write(str.toUpperCase());
      document.write("<br>");
      document.write(str.toLowerCase());
      document.write("<br>");
      document.write(str.startsWith('Al'));
      document.write("<br>");
        
        // Test Method -> returns true or false
        var str = "I learnt about Methods";
        var patt = new RegExp("about");
        var res = patt.test(str);
        document.write(res);
    </script>
  </body>
</html>
